<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#2e3150" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#2e3150" stroke-width="1"/>

  <!-- Left: branding -->
  <text x="160" y="248" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="80" fill="#f0c040">♠</text>
  <text x="260" y="248" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#f0c040">Poker</text>
  <text x="260" y="338" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#f0c040">Settler</text>
  <text x="263" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" fill="#888aaa">Who owes who, in seconds.</text>

  <!-- Divider -->
  <line x1="580" y1="80" x2="580" y2="550" stroke="#2e3150" stroke-width="2"/>

  <!-- Right: UI mockup cards -->
  <!-- Card 1: Player 3 → Player 1: 17 -->
  <rect x="630" y="90" width="520" height="110" rx="14" fill="#1a1d2e" stroke="#2e3150" stroke-width="1.5"/>
  <rect x="655" y="118" width="110" height="36" rx="7" fill="#5c1a1a" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="710" y="142" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#e74c3c">Player 3</text>
  <text x="783" y="142" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#888aaa">→</text>
  <rect x="807" y="118" width="110" height="36" rx="7" fill="#1a5c38" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="862" y="142" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2ecc71">Player 1</text>
  <text x="1110" y="145" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="800" fill="#f0c040">17</text>
  <text x="655" y="185" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#888aaa">Player 3 was down 17</text>
  <text x="1110" y="185" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#888aaa">Player 1 was up 25</text>

  <!-- Card 2: Player 4 → Player 1: 8 -->
  <rect x="630" y="220" width="520" height="110" rx="14" fill="#1a1d2e" stroke="#2e3150" stroke-width="1.5"/>
  <rect x="655" y="248" width="110" height="36" rx="7" fill="#5c1a1a" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="710" y="272" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#e74c3c">Player 4</text>
  <text x="783" y="272" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#888aaa">→</text>
  <rect x="807" y="248" width="110" height="36" rx="7" fill="#1a5c38" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="862" y="272" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2ecc71">Player 1</text>
  <text x="1110" y="275" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="800" fill="#f0c040">8</text>
  <text x="655" y="315" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#888aaa">Player 4 was down 12</text>
  <text x="1110" y="315" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#888aaa">Player 1 was up 25</text>

  <!-- Card 3: Player 5 → Player 2: 10.3 -->
  <rect x="630" y="350" width="520" height="110" rx="14" fill="#1a1d2e" stroke="#2e3150" stroke-width="1.5"/>
  <rect x="655" y="378" width="110" height="36" rx="7" fill="#5c1a1a" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="710" y="402" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#e74c3c">Player 5</text>
  <text x="783" y="402" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#888aaa">→</text>
  <rect x="807" y="378" width="110" height="36" rx="7" fill="#1a5c38" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="862" y="402" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2ecc71">Player 2</text>
  <text x="1110" y="405" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="800" fill="#f0c040">10.3</text>
  <text x="655" y="445" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#888aaa">Player 5 was down 10.3</text>
  <text x="1110" y="445" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" fill="#888aaa">Player 2 was up 14.3</text>

  <!-- Bottom label -->
  <text x="890" y="520" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#2e3150">shoobhidoobi.github.io/poker-settler</text>
</svg>
